extends:
  - "packages/*/lefthook.yml"

pre-commit:
  parallel: true
  commands:
    lint:
      root: "website/"
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm exec oxlint --fix {staged_files}
    format:
      glob: "*.{js,jsx,ts,tsx,json}"
      run: pnpm exec oxfmt {staged_files}

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
